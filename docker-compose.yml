services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  catalog_service:
    build: ./catalog_service
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=${FLASK_ENV}
      - DATABASE_URI=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
    depends_on:
      - mysql

  cart_service:
    build: ./cart_service
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=${FLASK_ENV}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  api_gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - catalog_service
      - cart_service

volumes:
  mysql_data:
